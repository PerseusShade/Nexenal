name: Build and Release Nexenal

on:
    push:
        tags:
            - 'v*'

jobs:
    build-installer:
        runs-on: windows-latest
        permissions:
            contents: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Build Rust binary
              run: cargo build --release

            - name: Compile Inno Setup Installer
              run: iscc scripts\nexenal.iss

            - name: Prepare auto-update binary
              run: |
                  cd target/release
                  Compress-Archive -Path nexenal.exe -DestinationPath nexenal-x86_64-pc-windows-msvc.zip

            - name: Verify Output Directory
              run: dir Output\

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      Output/*.exe
                      target/release/nexenal-x86_64-pc-windows-msvc.zip
                  generate_release_notes: true